  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<a href="index.html" target="_blank" style="text-decoration: underline">點擊此處回本專案首頁</a>
<h1>互動遊戲後端判斷工具</h1>
<p>勾選遊戲特性，看看你的遊戲是否需要後端 / 登入帳號：</p>

<label><input type="checkbox" id="singlePlayer"> 單機遊戲</label>
<label><input type="checkbox" id="crossDevice"> 跨裝置存檔</label>
<label><input type="checkbox" id="multiPlayer"> 多人同步 / 互動</label>

<button onclick="checkBackend()">判斷</button>

<div id="output" class="result"></div>

<script>
  function checkBackend() {
    const single = document.getElementById('singlePlayer').checked;
    const cross = document.getElementById('crossDevice').checked;
    const multi = document.getElementById('multiPlayer').checked;

    let backend = "不需要後端";
    let login = "不需要登入帳號";
    let devNote = "";

    if (cross || multi) {
      backend = "需要後端";
      login = "需要登入帳號";
      devNote = "💡 這是標準的線上混合架構（如原神、GTA Online），需要處理高並發與防作弊演算法。";
    } else if (single && !cross && !multi) {
      login = "可選 / 雲端存檔可用";
      devNote = "🦅 <b>正典架構：</b>就如同《吸血鬼與墮天使：黎凡特的非法代碼》，拒絕現代都市的靜態死物件與 GTA 標籤，在 10 世紀冷兵器時空實作 100% 空間存取，純單機本機存檔即可完美運行！";
    }

    document.getElementById('output').innerHTML =
            `<p>🖥️ 後端判斷：<strong>${backend}</strong></p>
             <p>🔑 登入帳號：<strong>${login}</strong></p>
             <p style="font-size:0.9em; color:#555; border-top:1px solid #ccc; padding-top:10px;">${devNote}</p>`;
  }
</script>
<ul id="messages"></ul>
<div id="social-share" style="margin-top: 20px;">
  <a id="fb-share" href="#" target="_blank" style="color: #4267B2; font-weight: bold;">分享到 Facebook</a>
  <span> | </span>
  <a id="line-share" href="#" target="_blank" style="color: #00C300; font-weight: bold;">分享到 Line</a>
  <span> | </span>
  <a id="twitter-share" href="#" target="_blank" style="color: #1DA1F2; font-weight: bold;">分享到 X</a>
</div>
<script>
  // 自動抓取當前頁面的 URL
  var currentUrl = window.location.href;
  // Facebook 分享
  document.getElementById("fb-share").href =
          "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(currentUrl);
  // Line 分享
  document.getElementById("line-share").href =
          "https://social-plugins.line.me/lineit/share?url=" + encodeURIComponent(currentUrl);
  // X (Twitter) 分享
  document.getElementById("twitter-share").href =
          "https://twitter.com/intent/tweet?url=" + encodeURIComponent(currentUrl) + "&text=你的文章標題";
</script>
